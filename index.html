<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncWatch | Premium Cinema</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #e50914;
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #00d4ff;
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', system-ui, sans-serif; 
            overflow: hidden; 
        }

        .hidden { display: none !important; }

        /* Login Glassmorphism */
        #login-screen { 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at center, #222 0%, #000 100%);
        }

        .card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 50px; 
            border-radius: 24px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Layout */
        #main-app { 
            display: grid; 
            grid-template-columns: 1fr 380px; 
            height: 100vh; 
        }

        /* Movie Side */
        .video-container { 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            background: linear-gradient(to bottom, #111, #000);
        }

        #mainVideo { 
            width: 100%; 
            border-radius: 12px; 
            background: #000; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        .host-controls { 
            display: flex; 
            gap: 12px; 
            background: var(--card); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #222;
        }

        .host-controls input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 8px; 
            border: none; 
            background: #000; 
            color: #fff; 
            font-size: 14px;
        }

        /* Sidebar Side */
        .sidebar { 
            background: var(--card); 
            border-left: 1px solid #222; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            gap: 20px;
        }

        .camera-grid { 
            display: grid; 
            grid-template-rows: 1fr 1fr; 
            gap: 15px; 
        }

        .cam-wrapper { 
            position: relative; 
            background: #000; 
            border-radius: 15px; 
            overflow: hidden; 
            height: 160px; 
            border: 2px solid #333;
            transition: border 0.3s;
        }

        .cam-wrapper.active-border { border-color: var(--primary); }

        .cam-wrapper video { width: 100%; height: 100%; object-fit: cover; }

        .cam-label { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            font-size: 12px; 
            background: rgba(0,0,0,0.7); 
            padding: 4px 10px; 
            border-radius: 20px; 
            font-weight: bold;
        }

        /* Controls */
        .av-buttons { display: flex; gap: 10px; }
        
        .btn-toggle {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            background: #333;
            color: white;
        }

        .btn-toggle.muted { background: var(--primary); }

        /* Chat Modern */
        .chat-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #000; 
            border-radius: 15px; 
            padding: 15px; 
            border: 1px solid #222;
        }

        #chatDisplay { 
            flex: 1; 
            overflow-y: auto; 
            font-size: 14px; 
            margin-bottom: 10px; 
        }

        .chat-msg { margin-bottom: 10px; line-height: 1.4; color: #aaa; }
        .chat-msg b { color: var(--accent); margin-right: 5px; }

        .chat-input-row { display: flex; gap: 8px; }
        .chat-input-row input { 
            flex: 1; 
            padding: 10px; 
            border-radius: 8px; 
            border: none; 
            background: #222; 
            color: white; 
        }

        .btn-primary { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card">
            <h1 style="font-size: 40px; margin-bottom: 10px; letter-spacing: -1px;">Sync<span style="color:var(--primary)">Watch</span></h1>
            <p style="color: #888; margin-bottom: 30px;">Private Cinema & Video Chat</p>
            <input type="text" id="roomInput" placeholder="Enter Room Name..." style="padding:15px; width:280px; border-radius:10px; border:none; background:#222; color:white; margin-bottom:20px;"><br>
            <button class="btn-primary" style="width: 100%;" onclick="joinRoom()">Join Session</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="video-container">
            <div class="host-controls">
                <input type="text" id="videoUrl" placeholder="Paste Direct Movie Link (.mp4)...">
                <button class="btn-primary" onclick="changeVideo()">Push to Sync</button>
            </div>
            <video id="mainVideo" controls crossorigin="anonymous" playsinline style="width:100%; background:black;"></video>
        </div>

        <div class="sidebar">
            <div class="camera-grid">
                <div class="cam-wrapper">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="cam-label">YOU</div>
                </div>
                <div class="cam-wrapper">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="cam-label">FRIEND</div>
                </div>
            </div>

            <div class="av-buttons">
                <button id="micBtn" class="btn-toggle" onclick="toggleMic()">Mute Mic</button>
                <button id="camBtn" class="btn-toggle" onclick="toggleCam()">Stop Video</button>
            </div>

            <div class="chat-area">
                <div id="chatDisplay"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="Send a message...">
                    <button class="btn-primary" style="padding:10px;" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBWgS5isj1hERu1IXh6xv1cn83xftdeDgo",
            databaseURL: "https://watch-party-pro-default-rtdb.firebaseio.com/",
            projectId: "watch-party-pro",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomId = "";
        let localStream;
        let peerConnection;
        const mainVideo = document.getElementById('mainVideo');
        let isRemoteUpdate = false;

      const rtcConfig = {
    iceServers: [
        {
            urls: [
                'stun:stun.l.google.com:19302',
                'stun:stun1.l.google.com:19302',
                'stun:stun2.l.google.com:19302',
                'stun:stun3.l.google.com:19302',
                'stun:stun4.l.google.com:19302',
            ],
        },
    ],
};

        async function joinRoom() {
            roomId = document.getElementById('roomInput').value.trim();
            if(!roomId) return;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');

            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;

            initSync();
            initChat();
            initWebRTC();
        }

        // --- MOVIE SYNC ---
        function initSync() {
            const ref = db.ref(`rooms/${roomId}/sync`);
            ref.on('value', snap => {
                const data = snap.val();
                if(!data) return;
                isRemoteUpdate = true;
                if(mainVideo.src !== data.url) mainVideo.src = data.url;
                if(Math.abs(mainVideo.currentTime - data.time) > 2) mainVideo.currentTime = data.time;
                data.playing ? mainVideo.play() : mainVideo.pause();
                setTimeout(() => isRemoteUpdate = false, 500);
            });
        }

        function changeVideo() {
            const url = document.getElementById('videoUrl').value;
            db.ref(`rooms/${roomId}/sync`).set({ url, time: 0, playing: true });
        }

        mainVideo.onplay = () => { if(!isRemoteUpdate) db.ref(`rooms/${roomId}/sync`).update({ time: mainVideo.currentTime, playing: true }); };
        mainVideo.onpause = () => { if(!isRemoteUpdate) db.ref(`rooms/${roomId}/sync`).update({ time: mainVideo.currentTime, playing: false }); };

        // --- VIDEO CHAT HANDSHAKE ---
     async function initWebRTC() {
    // 1. Create a unique ID for THIS phone
    const myId = Math.random().toString(36).substring(7);
    const pcMap = {}; // This will store connections to every person in the room

    // 2. Function to create a connection to a specific person
    async function createPeerConnection(peerId, isOffer) {
        const pc = new RTCPeerConnection(rtcConfig);
        pcMap[peerId] = pc;

        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        pc.ontrack = (event) => {
            // If it's a new person, show them in the remote video
            // Note: For 3+ people, this will show the LATEST person who joined
            document.getElementById('remoteVideo').srcObject = event.streams[0];
        };

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                db.ref(`rooms/${roomId}/ice/${peerId}/${myId}`).push(event.candidate.toJSON());
            }
        };

        if (isOffer) {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            db.ref(`rooms/${roomId}/offers/${peerId}/${myId}`).set({ offer });
        }

        return pc;
    }

    // 3. Tell the room I am here
    const myPresenceRef = db.ref(`rooms/${roomId}/users/${myId}`);
    myPresenceRef.set(true);
    myPresenceRef.onDisconnect().remove();

    // 4. Listen for others joining
    db.ref(`rooms/${roomId}/users`).on('child_added', async (snapshot) => {
        const peerId = snapshot.key;
        if (peerId !== myId) {
            // I create an offer to the new person
            await createPeerConnection(peerId, true);
        }
    });

    // 5. Listen for Offers sent TO ME
    db.ref(`rooms/${roomId}/offers/${myId}`).on('child_added', async (snapshot) => {
        const peerId = snapshot.key;
        const data = snapshot.val();
        const pc = await createPeerConnection(peerId, false);
        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        db.ref(`rooms/${roomId}/answers/${peerId}/${myId}`).set({ answer });
    });

    // 6. Listen for Answers sent TO ME
    db.ref(`rooms/${roomId}/answers/${myId}`).on('child_added', async (snapshot) => {
        const peerId = snapshot.key;
        const data = snapshot.val();
        if (pcMap[peerId]) {
            await pcMap[peerId].setRemoteDescription(new RTCSessionDescription(data.answer));
        }
    });

    // 7. Listen for ICE candidates sent TO ME
    db.ref(`rooms/${roomId}/ice/${myId}`).on('child_added', (snapshot) => {
        const peerId = snapshot.key;
        snapshot.forEach(child => {
            if (pcMap[peerId]) {
                pcMap[peerId].addIceCandidate(new RTCIceCandidate(child.val())).catch(e => {});
            }
        });
    });
}
        // --- UI CONTROLS ---
        function toggleMic() {
            const t = localStream.getAudioTracks()[0];
            t.enabled = !t.enabled;
            const btn = document.getElementById('micBtn');
            btn.innerText = t.enabled ? "Mute Mic" : "Unmute Mic";
            btn.classList.toggle('muted', !t.enabled);
        }

        function toggleCam() {
            const t = localStream.getVideoTracks()[0];
            t.enabled = !t.enabled;
            const btn = document.getElementById('camBtn');
            btn.innerText = t.enabled ? "Stop Video" : "Start Video";
            btn.classList.toggle('muted', !t.enabled);
        }

        function initChat() {
            db.ref(`rooms/${roomId}/chat`).on('child_added', s => {
                const m = document.createElement('div');
                m.className = 'chat-msg';
                m.innerHTML = `<b>Friend:</b> ${s.val()}`;
                document.getElementById('chatDisplay').appendChild(m);
                document.getElementById('chatDisplay').scrollTop = 9999;
            });
        }

        function sendMessage() {
            const i = document.getElementById('chatInput');
            if(i.value) { db.ref(`rooms/${roomId}/chat`).push(i.value); i.value = ""; }
        }
    </script>
</body>
</html>
