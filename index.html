<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Party Pro Fixed</title>
<style>
  body { font-family:sans-serif; background:#121212; color:#fff; display:flex; flex-direction:column; align-items:center; padding:20px; }
  video { border:2px solid #fff; margin:10px; max-width:90%; max-height:300px; }
  input, button { padding:8px; margin:5px; border-radius:5px; border:none; }
  #controls { margin:10px; }
  #cams { display:flex; }
</style>
</head>
<body>

<h1>Watch Party Pro</h1>

<video id="moviePlayer" controls></video>

<div id="controls">
  <input id="roomInput" placeholder="Room ID">
  <button id="joinBtn">Join Room</button>
  <input id="videoUrlInput" placeholder="Video URL">
  <button id="loadVideoBtn">Load Video (Host Only)</button>
</div>

<div id="cams">
  <video id="localVideo" autoplay muted playsinline></video>
  <video id="remoteVideo" autoplay playsinline></video>
</div>
  <div id="audioControls">
  <button id="muteBtn">Mute Mic</button>
  <label>Remote Volume:
    <input type="range" id="remoteVolume" min="0" max="1" step="0.05" value="1">
  </label>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
window.onload = function() {
window.onload = async function() {
  let localStream, peerConnection, isHost=false, currentRoom="";
  const SYNC_THRESHOLD = 0.5;
  const servers = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

  // Get local video + audio
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
    localVideo.srcObject = localStream;
  } catch(err) {
    alert("Please allow camera and microphone access!");
    console.error(err);
  }

  // Firebase reference
  const database = firebase.database();

  // Buttons and inputs
  const moviePlayer = document.getElementById("moviePlayer");
  const joinBtn = document.getElementById("joinBtn");
  const roomInput = document.getElementById("roomInput");
  const videoUrlInput = document.getElementById("videoUrlInput");
  const loadVideoBtn = document.getElementById("loadVideoBtn");
  const remoteVideo = document.getElementById("remoteVideo");

  // ===== JOIN ROOM =====
  joinBtn.onclick = async function() {
    currentRoom = roomInput.value.trim();
    if(!currentRoom) { alert("Enter Room ID!"); return; }

    if(peerConnection) peerConnection.close();
    peerConnection = new RTCPeerConnection(servers);

    // Attach local tracks
    if(localStream) localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

    // Remote video
    peerConnection.ontrack = e => { remoteVideo.srcObject = e.streams[0]; }

    // ICE candidates
    peerConnection.onicecandidate = e => {
      if(e.candidate){
        const path = isHost ? "callerCandidates" : "calleeCandidates";
        database.ref(`calls/${currentRoom}/${path}`).push(e.candidate.toJSON());
      }
    }

    // Determine host
    const videoSnap = await database.ref(`rooms/${currentRoom}/video`).once("value");
    isHost = !videoSnap.exists();
    if(isHost){ database.ref(`calls/${currentRoom}`).remove(); alert("You are the host. Paste a video URL."); }
    else alert("You are a viewer. Video will load automatically.");

    // Listen for ICE candidates from peer
    database.ref(`calls/${currentRoom}/callerCandidates`).on("child_added", snap => { if(!isHost) peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())); });
    database.ref(`calls/${currentRoom}/calleeCandidates`).on("child_added", snap => { if(isHost) peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())); });

    // WebRTC signaling: offer or answer
    const offerSnap = await database.ref(`calls/${currentRoom}/offer`).once("value");
    if(!offerSnap.exists()) createOffer();
    else answerOffer(offerSnap.val());

    // Listen for video sync updates
    database.ref(`rooms/${currentRoom}/video`).on("value", snapshot => {
      const data = snapshot.val();
      if(!data) return;
      if(!isHost){
        moviePlayer.src = data.url;
        moviePlayer.currentTime = data.time || 0;
        if(data.playing) moviePlayer.play();
        else moviePlayer.pause();
      }
    });
    database.ref(`rooms/${currentRoom}/sync`).on("value", snapshot => {
      if(isHost) return;
      const data = snapshot.val(); if(!data) return;
      const diff = Math.abs(moviePlayer.currentTime - data.time);
      if(diff > SYNC_THRESHOLD) moviePlayer.currentTime = data.time;
      if(data.playing && moviePlayer.paused) moviePlayer.play();
      if(!data.playing && !moviePlayer.paused) moviePlayer.pause();
    });
  };

  // ===== HOST LOAD VIDEO =====
  loadVideoBtn.onclick = function() {
    if(!currentRoom) { alert("Join a room first!"); return; }
    const url = videoUrlInput.value.trim(); if(!url){ alert("Paste a valid video URL!"); return; }
    isHost = true;
    moviePlayer.src = url; moviePlayer.currentTime = 0; moviePlayer.play();
    database.ref(`rooms/${currentRoom}/video`).set({ url:url, time:0, playing:true });
  };

  // ===== HOST SYNC =====
  function hostSync(){
    if(!isHost) return;
    database.ref(`rooms/${currentRoom}/sync`).set({ time:moviePlayer.currentTime, playing:!moviePlayer.paused });
  }
  setInterval(hostSync, 300);
  moviePlayer.addEventListener("play", hostSync);
  moviePlayer.addEventListener("pause", hostSync);

  // ===== WEBRTC FUNCTIONS =====
  async function createOffer(){
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    await database.ref(`calls/${currentRoom}/offer`).set(offer);

    database.ref(`calls/${currentRoom}/answer`).on("value", async snap => {
      const data = snap.val(); if(!data) return;
      await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
    });
  }

  async function answerOffer(offerData){
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offerData));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    await database.ref(`calls/${currentRoom}/answer`).set(answer);
  }
};
</script>

</body>
</html>
