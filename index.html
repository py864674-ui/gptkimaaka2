<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Party Pro</title>
<style>
  body { font-family: sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  video { border: 2px solid #fff; margin: 10px; max-width: 90%; max-height: 300px; }
  input, button { padding: 8px; margin: 5px; border-radius: 5px; border: none; }
  #controls { margin: 10px; }
</style>
</head>
<body>

<h1>Watch Party Pro</h1>

<video id="moviePlayer" controls></video>

<div id="controls">
  <input id="roomInput" placeholder="Room ID">
  <button id="joinBtn">Join Room</button>
  <input id="videoUrlInput" placeholder="Video URL">
  <button id="loadVideoBtn">Load Video (Host Only)</button>
</div>

<div>
  <video id="localVideo" autoplay muted playsinline></video>
  <video id="remoteVideo" autoplay playsinline></video>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
window.onload = function() {
  // ===== Firebase config =====
  const firebaseConfig = {
    apiKey: "AIzaSyBWgS5isj1hERu1IXh6xv1cn83xftdeDgo",
    authDomain: "watch-party-pro.firebaseapp.com",
    databaseURL: "https://watch-party-pro-default-rtdb.firebaseio.com",
    projectId: "watch-party-pro",
    storageBucket: "watch-party-pro.appspot.com",
    messagingSenderId: "424851022131",
    appId: "1:424851022131:web:d3c090eafa662e0f2b1e46"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // ===== Variables =====
  let currentRoom = "";
  let isHost = false;
  let peerConnection;
  const SYNC_THRESHOLD = 0.5;
  const servers = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

  const moviePlayer = document.getElementById("moviePlayer");
  const joinBtn = document.getElementById("joinBtn");
  const roomInput = document.getElementById("roomInput");
  const videoUrlInput = document.getElementById("videoUrlInput");
  const loadVideoBtn = document.getElementById("loadVideoBtn");
  const localVideo = document.getElementById("localVideo");
  const remoteVideo = document.getElementById("remoteVideo");

  // ===== Camera/Mic =====
  navigator.mediaDevices.getUserMedia({ video: true, audio: true })
    .then(stream => {
      localVideo.srcObject = stream;
      window.localStream = stream;
      peerConnection = new RTCPeerConnection(servers);
      stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));
      peerConnection.ontrack = e => remoteVideo.srcObject = e.streams[0];
    })
    .catch(err => {
      console.error(err);
      alert("Allow camera/mic access!");
    });

  // ===== Host Sync =====
  function hostSync() {
    if (!isHost || !currentRoom) return;
    database.ref("rooms/" + currentRoom + "/sync").set({
      time: moviePlayer.currentTime,
      playing: !moviePlayer.paused
    });
  }
  setInterval(hostSync, 300);
  moviePlayer.addEventListener("play", hostSync);
  moviePlayer.addEventListener("pause", hostSync);

  // ===== Join Room =====
  joinBtn.onclick = function() {
    const roomId = roomInput.value.trim();
    if (!roomId) { alert("Enter Room ID"); return; }
    currentRoom = roomId;

    if (peerConnection) { peerConnection.close(); peerConnection = null; }
    peerConnection = new RTCPeerConnection(servers);
    if (window.localStream) window.localStream.getTracks().forEach(track => peerConnection.addTrack(track, window.localStream));
    peerConnection.ontrack = e => remoteVideo.srcObject = e.streams[0];

    database.ref("rooms/" + currentRoom + "/video").once("value", snap => {
      isHost = !snap.exists();
      if (isHost) database.ref("calls/" + currentRoom).remove();
      alert(isHost ? "You are host. Paste URL" : "Viewer: video will load automatically");

      database.ref("calls/" + currentRoom + "/offer").once("value")
        .then(snap2 => { if (!snap2.exists()) createOffer(); else answerOffer(snap2.val()); });
    });

    // Video listener
    database.ref("rooms/" + currentRoom + "/video").on("value", snap => {
      const data = snap.val();
      if (!data || isHost) return;
      moviePlayer.src = data.url;
      moviePlayer.currentTime = data.time || 0;
      if (data.playing) moviePlayer.play().catch(()=>{});
      else moviePlayer.pause();
    });

    // Sync listener
    database.ref("rooms/" + currentRoom + "/sync").on("value", snap => {
      if (isHost) return;
      const data = snap.val();
      if (!data) return;
      const diff = Math.abs(moviePlayer.currentTime - data.time);
      if (diff > SYNC_THRESHOLD) moviePlayer.currentTime = data.time;
      if (data.playing) moviePlayer.play().catch(()=>{});
      if (!data.playing && !moviePlayer.paused) moviePlayer.pause();
    });
  };

  // ===== Host load video =====
  loadVideoBtn.onclick = function() {
    if (!currentRoom) { alert("Join a room"); return; }
    const url = videoUrlInput.value.trim();
    if (!url) { alert("Paste valid URL"); return; }
    isHost = true;
    moviePlayer.src = url;
    moviePlayer.currentTime = 0;
    moviePlayer.play();
    database.ref("rooms/" + currentRoom + "/video").set({ url, time: 0, playing: true });
  };

  // ===== WebRTC =====
  async function createOffer() {
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    await database.ref("calls/" + currentRoom).set({ offer: { type: offer.type, sdp: offer.sdp } });

    peerConnection.onicecandidate = e => { if (e.candidate) database.ref("calls/" + currentRoom + "/callerCandidates").push(e.candidate.toJSON()); };

    database.ref("calls/" + currentRoom + "/answer").on("value", async snap => {
      const data = snap.val();
      if (!data) return;
      await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
    });

    database.ref("calls/" + currentRoom + "/calleeCandidates").on("child_added", snap => {
      peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
    });
  }

  async function answerOffer(offerData) {
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offerData));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    await database.ref("calls/" + currentRoom + "/answer").set({ type: answer.type, sdp: answer.sdp });

    peerConnection.onicecandidate = e => { if (e.candidate) database.ref("calls/" + currentRoom + "/calleeCandidates").push(e.candidate.toJSON()); };

    database.ref("calls/" + currentRoom + "/callerCandidates").on("child_added", snap => {
      peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
    });
  }

};
</script>
</body>
</html>
