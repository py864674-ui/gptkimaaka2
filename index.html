<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Party Pro Fixed</title>
<style>
  body { font-family:sans-serif; background:#121212; color:#fff; display:flex; flex-direction:column; align-items:center; padding:20px; }
  video { border:2px solid #fff; margin:10px; max-width:90%; max-height:300px; }
  input, button { padding:8px; margin:5px; border-radius:5px; border:none; }
  #controls { margin:10px; }
  #cams { display:flex; }
</style>
</head>
<body>

<h1>Watch Party Pro</h1>

<video id="moviePlayer" controls></video>

<div id="controls">
  <input id="roomInput" placeholder="Room ID">
  <button id="joinBtn">Join Room</button>
  <input id="videoUrlInput" placeholder="Video URL">
  <button id="loadVideoBtn">Load Video (Host Only)</button>
</div>

<div id="cams">
  <video id="localVideo" autoplay muted playsinline></video>
  <video id="remoteVideo" autoplay playsinline></video>
</div>
  <div id="audioControls">
  <button id="muteBtn">Mute Mic</button>
  <label>Remote Volume:
    <input type="range" id="remoteVolume" min="0" max="1" step="0.05" value="1">
  </label>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBWgS5isj1hERu1IXh6xv1cn83xftdeDgo",
    authDomain: "watch-party-pro.firebaseapp.com",
    databaseURL: "https://watch-party-pro-default-rtdb.firebaseio.com",
    projectId: "watch-party-pro",
    storageBucket: "watch-party-pro.appspot.com",
    messagingSenderId: "424851022131",
    appId: "1:424851022131:web:d3c090eafa662e0f2b1e46"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // Variables
  let currentRoom = "";
  let isHost = false;
  let peerConnection;
  let localStream;
  const SYNC_THRESHOLD = 0.5;
  const servers = { iceServers:[{ urls:"stun:stun.l.google.com:19302" }] };

  const moviePlayer = document.getElementById("moviePlayer");
  const joinBtn = document.getElementById("joinBtn");
  const roomInput = document.getElementById("roomInput");
  const videoUrlInput = document.getElementById("videoUrlInput");
  const loadVideoBtn = document.getElementById("loadVideoBtn");
  const localVideo = document.getElementById("localVideo");
  const remoteVideo = document.getElementById("remoteVideo");

  // ===== Camera/Mic =====
  navigator.mediaDevices.getUserMedia({ video:true, audio:true })
  .then(stream => {
    localStream = stream;
    localVideo.srcObject = stream;
    // ===== Mic Mute/Unmute =====
const muteBtn = document.getElementById("muteBtn");
let micMuted = false;

muteBtn.onclick = () => {
  if (!localStream) return;
  localStream.getAudioTracks().forEach(track => track.enabled = micMuted); // toggle
  micMuted = !micMuted;
  muteBtn.textContent = micMuted ? "Unmute Mic" : "Mute Mic";
};

// ===== Remote Volume Control =====
const remoteVolume = document.getElementById("remoteVolume");
remoteVolume.addEventListener("input", () => {
  remoteVideo.volume = parseFloat(remoteVolume.value);
});
    

    peerConnection = new RTCPeerConnection(servers);
    stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

    peerConnection.ontrack = e => remoteVideo.srcObject = e.streams[0];

    peerConnection.onicecandidate = e => {
      if (!currentRoom || !e.candidate) return;
      database.ref("calls/"+currentRoom+"/myCandidates").push(e.candidate.toJSON());
    };
  })
  .catch(err => { console.error(err); alert("Allow camera/mic access!"); });

  // ===== Host Sync =====
  function hostSync() {
    if (!isHost || !currentRoom) return;
    database.ref("rooms/"+currentRoom+"/sync").set({
      time: moviePlayer.currentTime,
      playing: !moviePlayer.paused
    });
  }
  setInterval(hostSync, 300);
  moviePlayer.addEventListener("play", hostSync);
  moviePlayer.addEventListener("pause", hostSync);

  // ===== Join Room =====
  joinBtn.onclick = async function() {
    const roomId = roomInput.value.trim();
    if (!roomId) { alert("Enter Room ID"); return; }
    currentRoom = roomId;

    // Check host
    const snap = await database.ref("rooms/"+currentRoom+"/video").once("value");
    isHost = !snap.exists();
    if (isHost) database.ref("calls/"+currentRoom).remove();
    alert(isHost ? "Host: paste URL" : "Viewer: video will load automatically");

    // Sync immediately for new viewer
    if (!isHost) {
      const syncSnap = await database.ref("rooms/"+currentRoom+"/sync").once("value");
      const videoSnap = await database.ref("rooms/"+currentRoom+"/video").once("value");
      const data = videoSnap.val();
      const sync = syncSnap.val();
      if (data) { moviePlayer.src = data.url; moviePlayer.currentTime = sync?.time||0; if(sync?.playing) moviePlayer.play().catch(()=>{}); }
    }

    // WebRTC offer/answer
    const offerSnap = await database.ref("calls/"+currentRoom+"/offer").once("value");
    if (!offerSnap.exists()) await createOffer();
    else await answerOffer(offerSnap.val());

    // Listen for ICE candidates
    database.ref("calls/"+currentRoom+"/remoteCandidates").on("child_added", snap => {
      peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
    });

    // Video and sync listeners
    database.ref("rooms/"+currentRoom+"/video").on("value", snap=>{
      const data = snap.val();
      if (!data || isHost) return;
      moviePlayer.src = data.url; moviePlayer.currentTime = data.time||0;
      if(data.playing) moviePlayer.play().catch(()=>{}); else moviePlayer.pause();
    });

    database.ref("rooms/"+currentRoom+"/sync").on("value", snap=>{
      if(isHost) return;
      const data = snap.val();
      if(!data) return;
      const diff = Math.abs(moviePlayer.currentTime - data.time);
      if(diff>SYNC_THRESHOLD) moviePlayer.currentTime = data.time;
      if(data.playing) moviePlayer.play().catch(()=>{}); else if(!data.playing && !moviePlayer.paused) moviePlayer.pause();
    });
  };

  // ===== Host Load Video =====
  loadVideoBtn.onclick = function() {
    if (!currentRoom) { alert("Join a room"); return; }
    const url = videoUrlInput.value.trim();
    if (!url) { alert("Paste valid URL"); return; }
    isHost = true;
    moviePlayer.src = url; moviePlayer.currentTime=0; moviePlayer.play();
    database.ref("rooms/"+currentRoom+"/video").set({ url, time:0, playing:true });
  };

  // ===== WebRTC =====
  async function createOffer() {
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    await database.ref("calls/"+currentRoom+"/offer").set({type:offer.type,sdp:offer.sdp});
    database.ref("calls/"+currentRoom+"/answer").on("value", snap=>{
      const answer = snap.val(); if(!answer) return;
      peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
    });
    database.ref("calls/"+currentRoom+"/calleeCandidates").on("child_added", snap=>{
      peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
    });
  }

  async function answerOffer(offer) {
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    await database.ref("calls/"+currentRoom+"/answer").set({type:answer.type,sdp:answer.sdp});
    database.ref("calls/"+currentRoom+"/callerCandidates").on("child_added", snap=>{
      peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
    });
  }

};
</script>

</body>
</html>
